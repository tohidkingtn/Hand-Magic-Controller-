<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Magic Hand Air Drawing</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  video {
    display: none; /* camera hidden */
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
  }

  #info {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: cyan;
    font-size: 18px;
    text-shadow: 0 0 10px cyan;
  }
</style>
</head>

<body>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>
<div id="info">☝️ Index Finger se Hawa me Draw Karo</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lastX = null;
let lastY = null;

/* MediaPipe Hands */
const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(results => {
  if (!results.multiHandLandmarks) {
    lastX = null;
    lastY = null;
    return;
  }

  const finger = results.multiHandLandmarks[0][8];

  const x = finger.x * canvas.width;
  const y = finger.y * canvas.height;

  ctx.strokeStyle = "cyan";
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.shadowColor = "cyan";
  ctx.shadowBlur = 20;

  if (lastX !== null) {
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
  }

  lastX = x;
  lastY = y;
});

/* Camera */
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});

camera.start();

/* Resize support */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
