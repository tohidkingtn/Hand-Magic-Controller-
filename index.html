<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Free Rewards Zone</title>

<style>
body{
 font-family:Arial;
 background:#f2f2f2;
 text-align:center;
}

h1{
 background:#111;
 color:white;
 padding:15px;
}

.container{
 display:flex;
 flex-wrap:wrap;
 justify-content:center;
}

.card{
 background:white;
 width:260px;
 margin:15px;
 padding:15px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
 width:100%;
 border-radius:8px;
}

button{
 margin-top:10px;
 padding:10px 15px;
 background:#28a745;
 color:white;
 border:none;
 border-radius:6px;
 cursor:pointer;
}
</style>
</head>

<body>

<h1>🎁 Free Rewards Collection</h1>

<div class="container" id="products"></div>

<script>

const items = [

{
 name:"Random Earbuds",
 img:"https://images.unsplash.com/photo-1585386959984-a41552231658"
},

{
 name:"Stylish Shoes",
 img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"
},

{
 name:"Free Fire Diamond 500",
 img:"https://i.imgur.com/9Xn4K3K.png"
},

{
 name:"PUBG UC 500",
 img:"https://i.imgur.com/0Z8FQ6S.png"
}

];

// random items show function
function showRandomItems(){

 let container = document.getElementById("products");
 container.innerHTML="";

 let shuffled = items.sort(()=>0.5-Math.random());

 shuffled.forEach(item=>{
   container.innerHTML += `
     <div class="card">
       <img src="${item.img}">
       <h3>${item.name}</h3>
       <button onclick="claim()">Claim Now</button>
     </div>
   `;
 });

}

function claim(){
 alert("Reward claim process start!");
}

showRandomItems();

</script>

</body>
</html>
